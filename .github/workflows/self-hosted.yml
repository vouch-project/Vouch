name: Self-hosted

on:
  push:
    branches:
      - feat/wallet-connect

jobs:
  run:
    name: Run on self-hosted runner
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo branch info
        run: |
          echo "Running on self-hosted runner"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.event_name }}"
